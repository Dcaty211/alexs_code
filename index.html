<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Code v2.1</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .header {
            margin-bottom: 20px;
        }
        .app-title { font-size: 24px; font-weight: bold; margin: 0; }
        .app-version { font-size: 16px; margin: 0; }

        /* Контейнер для кнопок керування */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .sq-button {
            width: 35px;
            height: 35px;
            border: 2px solid #ffffff;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
        }
        .sq-button:hover { background-color: #1a1a1a; }

        .settings-panel {
            display: none;
            border: 1px solid #ffffff;
            padding: 15px;
            margin-bottom: 20px;
            width: fit-content;
        }
        .input-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
            gap: 15px;
        }
        input[type="number"] {
            width: 50px;
            padding: 5px;
            border: 1px solid #ffffff;
            background-color: #000000;
            color: white;
            text-align: center;
        }

        .main-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        textarea {
            flex: 1;
            height: 350px;
            padding: 15px;
            border: 2px solid #ffffff;
            background-color: #000000;
            color: white;
            resize: none;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="header">
    <p class="app-title">Alex's code</p>
    <p class="app-version">v2.1</p>
</div>

<div class="controls">
    <button class="sq-button" onclick="toggleSettings()" title="Settings">⚙️</button>
    <button class="sq-button" id="langBtn" onclick="toggleLang()">EN</button>
</div>

<div class="settings-panel" id="settingsPanel">
    <div class="input-group">
        <label id="labelBase">🔑 Базовий зсув:</label>
        <input type="number" id="baseShift" value="3" oninput="updateAll()">
    </div>
    <div class="input-group">
        <label id="labelS1">⚙️ Додатковий 1:</label>
        <input type="number" id="s1" value="1" oninput="updateAll()">
    </div>
    <div class="input-group">
        <label id="labelS2">⚙️ Додатковий 2:</label>
        <input type="number" id="s2" value="2" oninput="updateAll()">
    </div>
    <div class="input-group">
        <label id="labelS3">⚙️ Додатковий 3:</label>
        <input type="number" id="s3" value="3" oninput="updateAll()">
    </div>
</div>

<div class="main-container">
    <textarea id="inputText" placeholder="Орігінальний текст..." oninput="encryptAction()"></textarea>
    <textarea id="outputText" placeholder="Шифр..." oninput="decryptAction()"></textarea>
</div>

<script>
    let currentLang = 'UA';

    const translations = {
        UA: {
            base: "🔑 Базовий зсув:",
            s1: "⚙️ Додатковий 1:",
            s2: "⚙️ Додатковий 2:",
            s3: "⚙️ Додатковий 3:",
            input: "Орігінальний текст...",
            output: "Шифр..."
        },
        EN: {
            base: "🔑 Base shift:",
            s1: "⚙️ Extra shift 1:",
            s2: "⚙️ Extra shift 2:",
            s3: "⚙️ Extra shift 3:",
            input: "Original text...",
            output: "Ciphertext..."
        }
    };

    function toggleLang() {
        currentLang = (currentLang === 'UA') ? 'EN' : 'UA';
        document.getElementById('langBtn').innerText = (currentLang === 'UA') ? 'EN' : 'UA';
        
        const t = translations[currentLang];
        document.getElementById('labelBase').innerText = t.base;
        document.getElementById('labelS1').innerText = t.s1;
        document.getElementById('labelS2').innerText = t.s2;
        document.getElementById('labelS3').innerText = t.s3;
        document.getElementById('inputText').placeholder = t.input;
        document.getElementById('outputText').placeholder = t.output;
    }

    function caesarVariable(text, baseShift, s1, s2, s3, encrypt) {
        let result = "";
        let letterIndex = 0;
        let currentShift = baseShift;
        const extra = [s1, s2, s3];

        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            let code = text.charCodeAt(i);

            if ((code >= 65 && code <= 90) || (code >= 97 && code <= 122)) {
                let shift = encrypt ? currentShift : -currentShift;
                let isUpper = (code >= 65 && code <= 90);
                let base = isUpper ? 65 : 97;

                let newCharCode = ((code - base + shift) % 26 + 26000) % 26 + base;
                result += String.fromCharCode(newCharCode);

                currentShift += extra[letterIndex % 3];
                letterIndex++;
            } else {
                result += char;
            }
        }
        return result;
    }

    function toggleSettings() {
        const panel = document.getElementById('settingsPanel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    function getKeys() {
        return {
            baseShift: parseInt(document.getElementById('baseShift').value) || 0,
            s1: parseInt(document.getElementById('s1').value) || 0,
            s2: parseInt(document.getElementById('s2').value) || 0,
            s3: parseInt(document.getElementById('s3').value) || 0
        };
    }

    function encryptAction() {
        const keys = getKeys();
        const text = document.getElementById('inputText').value;
        document.getElementById('outputText').value = caesarVariable(text, keys.baseShift, keys.s1, keys.s2, keys.s3, true);
    }

    function decryptAction() {
        const keys = getKeys();
        const text = document.getElementById('outputText').value;
        document.getElementById('inputText').value = caesarVariable(text, keys.baseShift, keys.s1, keys.s2, keys.s3, false);
    }

    function updateAll() {
        encryptAction();
    }
</script>

</body>
</html>
